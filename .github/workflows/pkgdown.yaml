name: pkgdown

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            any::rmarkdown
            any::knitr
            any::ggplot2
            any::terra
            any::xml2
            any::remotes
          needs: website

      - name: Build site
        run: pkgdown::build_site(new_process = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        run: pkgdown::deploy_to_branch(new_process = FALSE, clean = FALSE)
        shell: Rscript {0}
